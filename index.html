<script>
var PHONE = "212717657640";
var DELIVERY = 50;

var cart = [];
var cStep = "cart";
var cF = { n:"", p:"", a:"" };
var cE = { n:"", p:"", a:"" };

var PRODUCTS = [
  {
    id:1,
    name:"كرة بابي فوت",
    price:250,
    desc:"كرة احترافية",
    img:"images/ball.jpg",
    cat:"foosball"
  },
  {
    id:2,
    name:"قفاز بيلياردو",
    price:80,
    desc:"قفاز احترافي",
    img:"images/rosolba.jpg",
    cat:"billiard"
  }
];

var SALES = [
  {
    name:"طقم كرات بيلياردو 16 كرة",
    oldPrice:1200,
    price:850,
    discount:29,
    desc:"طقم احترافي كامل",
    img:"images/billiard-ball.jpg",
    cat:"billiard",
    badge:"الأكثر مبيعاً 🔥"
  }
];

// ================= CORE FIX =================

function esc(s){
  return String(s).replace(/&/g,"&amp;")
                  .replace(/</g,"&lt;")
                  .replace(/>/g,"&gt;");
}

// FIX: add product
function addProd(idx){
  var p = PRODUCTS[idx];
  addC(p.id, p.name, p.price, p.img, p.cat);
}

// FIX: add sale
function addSale(idx){
  var p = SALES[idx];
  addC("sale_"+idx, p.name, p.price, p.img, p.cat);
}

// CART CORE
function addC(id,n,p,i,c){
  var x = cart.find(e=>e.id===id);
  if(x) x.q++;
  else cart.push({id,n,p,i,c,q:1});
  uBadge();
  dCart();
}

function rmC(id){
  cart = cart.filter(x=>x.id!==id);
  uBadge();
  dCart();
}

function uqC(id,q){
  if(q<1){ rmC(id); return; }
  var x = cart.find(e=>e.id===id);
  if(x) x.q = q;
  uBadge();
  dCart();
}

function clrC(){
  cart = [];
  uBadge();
  dCart();
}

// TOTAL
function tot(){
  var t=0,s=0;
  cart.forEach(x=>{
    t += x.q;
    s += x.q*x.p;
  });
  return {t,s,d:cart.length?DELIVERY:0,g:s+(cart.length?DELIVERY:0)};
}

// BADGE
function uBadge(){
  var r = tot();
  var b = document.getElementById("cartBadge");
  if(!b) return;

  if(r.t>0){
    b.className="absolute -top-1 -left-1 bg-red-500 w-5 h-5 flex items-center justify-center rounded-full text-xs";
    b.textContent = r.t>9?"+9":r.t;
  }else{
    b.className="hidden";
  }
}

// ================= CART UI =================

function openCart(){
  var o = document.getElementById("cartOvr");
  if(o){
    o.classList.remove("hidden");
    o.style.display="block";
  }
  dCart();
}

function closeCart(){
  var o = document.getElementById("cartOvr");
  if(o){
    o.style.display="none";
  }
}

function dCart(){
  var b = document.getElementById("cBdy");
  if(!b) return;

  if(cart.length===0){
    b.innerHTML = "<div style='padding:30px;text-align:center'>السلة فارغة 🛒</div>";
    return;
  }

  var html = "";
  cart.forEach(x=>{
    html += `
      <div style="margin:10px;padding:10px;background:#222;border-radius:10px">
        <div>${esc(x.n)}</div>
        <div>${x.p} DH</div>

        <div style="display:flex;gap:10px;align-items:center">
          <button onclick="uqC('${x.id}',${x.q+1})">+</button>
          <span>${x.q}</span>
          <button onclick="uqC('${x.id}',${x.q-1})">-</button>
        </div>

        <button onclick="rmC('${x.id}')">🗑 حذف</button>
      </div>
    `;
  });

  b.innerHTML = html;
}
</script>
