<body class="bg-bblack text-white">

<!-- ================= DATA ================= -->
<script>
var PHONE = "212717657640";
var DELIVERY = 50;

// 🔥 IMPORTANT FIX: GLOBAL STATE
var cart = [];
var cStep = "cart";
var cF = { n:"", p:"", a:"" };
var cE = { n:"", p:"", a:"" };

// PRODUCTS
var PRODUCTS = [
  {
    id:1,
    name:"كرة بابي فوت",
    price:250,
    desc:"كرة احترافية",
    img:"images/ball.jpg",
    cat:"foosball"
  },
  {
    id:2,
    name:"قفاز بيلياردو",
    price:80,
    desc:"قفاز احترافي",
    img:"images/rosolba.jpg",
    cat:"billiard"
  }
];

// SALES
var SALES = [
  {
    name:"طقم كرات بيلياردو 16 كرة",
    oldPrice:1200,
    price:850,
    discount:29,
    desc:"طقم احترافي كامل",
    img:"images/billiard-ball.jpg",
    cat:"billiard",
    badge:"الأكثر مبيعاً 🔥"
  }
];
</script>

<!-- ================= CART FUNCTIONS ================= -->
<script>
function esc(s){
  return String(s)
  .replace(/&/g,"&amp;")
  .replace(/</g,"&lt;")
  .replace(/>/g,"&gt;");
}

// FIXED addProd (no duplicate function anymore)
function addProd(idx){
  var p = PRODUCTS[idx];
  addC(p.id, p.name, p.price, p.img, p.cat);
}

function addSale(idx){
  var p = SALES[idx];
  addC("sale_"+idx, p.name, p.price, p.img, p.cat);
}

function addC(id,n,p,i,c){
  var x = cart.find(e=>e.id===id);
  if(x) x.q++;
  else cart.push({id,n,p,i,c,q:1});
  uBadge();
}

function rmC(id){
  cart = cart.filter(x=>x.id!==id);
  uBadge();
  dCart();
}

function uqC(id,q){
  if(q<1){ rmC(id); return; }
  var x = cart.find(e=>e.id===id);
  if(x) x.q=q;
  uBadge();
  dCart();
}

function clrC(){
  cart = [];
  cStep="cart";
  cF={n:"",p:"",a:""};
  uBadge();
  dCart();
}

function tot(){
  var t=0,s=0;
  cart.forEach(x=>{
    t+=x.q;
    s+=x.q*x.p;
  });
  return {t,s,d:cart.length?DELIVERY:0,g:s+(cart.length?DELIVERY:0)};
}

function uBadge(){
  var r = tot();
  var b = document.getElementById("cartBadge");

  if(r.t>0){
    b.className="absolute -top-1 -left-1 bg-red-500 w-5 h-5 flex items-center justify-center rounded-full text-xs";
    b.textContent = r.t>9?"+9":r.t;
  } else b.className="hidden";
}
</script>

<!-- ================= CART UI (simplified safe) ================= -->
<script>
function openCart(){ document.getElementById("cartOvr").style.display="block"; dCart(); }
function closeCart(){ document.getElementById("cartOvr").style.display="none"; }

function dCart(){
  var r = tot();
  var b = document.getElementById("cBdy");

  if(cart.length===0){
    b.innerHTML = "<div class='p-10 text-center'>السلة فارغة 🛒</div>";
    return;
  }

  var html="";
  cart.forEach(x=>{
    html+=`
    <div style="margin:10px;padding:10px;background:#222;border-radius:10px">
      <div>${esc(x.n)}</div>
      <div>${x.p} DH</div>
      <div>
        <button onclick="uqC('${x.id}',${x.q+1})">+</button>
        <span>${x.q}</span>
        <button onclick="uqC('${x.id}',${x.q-1})">-</button>
      </div>
      <button onclick="rmC('${x.id}')">🗑</button>
    </div>`;
  });

  b.innerHTML = html;
}
</script>

<!-- ================= UI (minimal demo) ================= -->
<div style="padding:20px">
<h2>Products</h2>

<button onclick="addProd(0)">Add Ball</button>
<button onclick="addProd(1)">Add Glove</button>

<hr>

<button onclick="openCart()">Open Cart 🛒 <span id="cartBadge"></span></button>
</div>

<!-- CART -->
<div id="cartOvr" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000">
  <button onclick="closeCart()">Close</button>
  <div id="cBdy"></div>
</div>
